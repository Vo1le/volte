<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin - Panel TIPE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display:none;" id="admin-page">
    <div class="editor-container">
        <header>
            <h1>Panel de Rédaction</h1>
            <button onclick="window.location.href='index.html'" class="btn-primary" style="background:#444">Retour Site</button>
        </header>

        <!-- Tabs Navigation -->
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="switchAdminTab('articles')">📝 Articles</button>
            <button class="tab-btn" onclick="switchAdminTab('files')">📁 Fichiers</button>
        </div>

        <!-- ARTICLES TAB -->
        <div id="articles-tab" class="tab-content active">
            <div class="admin-grid">
                <aside class="sidebar-list">
                    <h3>Historique</h3>
                    <div id="existing-articles"></div>
                </aside>

                <main>
                    <h3 id="form-title">Nouvel Article</h3>
                    <form id="editor-form" onsubmit="event.preventDefault(); saveArticle();">
                        <input type="text" id="inp-title" placeholder="Titre de l'étape" required>
                        <input type="date" id="inp-date" required>
                        
                        <div class="badge-builder">
                            <div class="badge-inputs">
                                <input type="text" id="tag-text" placeholder="Nom balise (ex: Biblio)">
                                <input type="color" id="tag-color" value="#007acc">
                                <button type="button" onclick="addBadge()">Ajouter Balise</button>
                            </div>
                            <div id="current-badges-list"></div>
                        </div>

                        <textarea id="inp-summary" rows="2" placeholder="Résumé court..."></textarea>
                        <textarea id="inp-content" rows="10" placeholder="Contenu HTML..."></textarea>
                        
                        <!-- Fichiers attachés -->
                        <div class="attached-files-section">
                            <h4>📎 Fichiers attachés</h4>
                            <div id="article-files-list"></div>
                            <button type="button" onclick="openFileSelector()" class="btn-secondary">+ Attacher un fichier</button>
                        </div>
                        
                        <button type="submit" class="btn-primary" style="width:100%">1. Sauvegarder en mémoire</button>
                    </form>

                    <section class="github-zone">
                        <h3>Publication GitHub API</h3>
                        <div class="gh-inputs">
                            <input type="text" id="gh-u" placeholder="User">
                            <input type="text" id="gh-r" placeholder="Repo">
                            <input type="password" id="gh-t" placeholder="Token GitHub">
                        </div>
                        <button onclick="pushToGitHub()" class="btn-push">2. POUSSER LES MODIFICATIONS</button>
                        <p id="status-msg"></p>
                    </section>
                </main>
            </div>
        </div>

        <!-- FILES TAB -->
        <div id="files-tab" class="tab-content">
            <div class="files-manager">
                <aside class="sidebar-list">
                    <h3>Fichiers existants</h3>
                    <div id="existing-files"></div>
                </aside>

                <main>
                    <h3 id="file-form-title">Ajouter un fichier</h3>
                    <form id="file-form" onsubmit="event.preventDefault(); saveFile();">
                        <input type="text" id="file-name" placeholder="Nom du fichier" required>
                        
                        <select id="file-type" required onchange="updateFileInput()">
                            <option value="">-- Type de fichier --</option>
                            <option value="pdf">📄 PDF (Base64 ou URL)</option>
                            <option value="code">💻 Code</option>
                            <option value="csv">📊 CSV (Données tabulaires)</option>
                            <option value="image">🖼️ Image (URL)</option>
                            <option value="link">🔗 Lien externe</option>
                        </select>

                        <div id="file-input-area"></div>

                        <textarea id="file-description" rows="3" placeholder="Description du fichier (optionnel)"></textarea>
                        
                        <button type="submit" class="btn-primary" style="width:100%">Enregistrer le fichier</button>
                    </form>

                    <div id="file-preview-area" style="display:none;">
                        <h4>Aperçu</h4>
                        <div id="file-preview"></div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <!-- Modal pour sélectionner les fichiers à attacher -->
    <div id="file-selector-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeFileSelector()">&times;</span>
            <h2>Sélectionner des fichiers</h2>
            <div id="file-selector-list"></div>
            <button onclick="attachSelectedFiles()" class="btn-primary">Attacher les fichiers sélectionnés</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
